<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bevy Platformer (WASM)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #222;
            color: #eee;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 {
            margin: 20px 0;
            font-size: 2em;
            text-align: center;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            background: #000;
            border: 2px solid #444;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        #bevy-canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-size: 1.2em;
        }

        #controls {
            margin: 20px 0;
            padding: 20px;
            background: #333;
            border-radius: 8px;
            max-width: 800px;
        }

        #controls h2 {
            margin-top: 0;
            font-size: 1.3em;
            color: #4CAF50;
        }

        #controls p {
            margin: 8px 0;
            line-height: 1.6;
        }

        .key {
            background: #555;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
        }

        #status {
            margin: 10px 0;
            padding: 10px 20px;
            background: #444;
            border-radius: 5px;
            font-size: 0.9em;
        }

        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
            background: #4CAF50;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <h1>🎮 Bevy 2D Platformer (WASM)</h1>

    <div id="status">
        <span class="dot"></span> Server: <span id="server-status">Checking...</span>
    </div>

    <div id="game-container">
        <canvas id="bevy-canvas"></canvas>
        <div id="loading">
            <p>Loading game...</p>
            <p style="font-size: 0.8em; color: #999;">Initializing WebAssembly...</p>
        </div>
    </div>

    <div id="controls">
        <h2>🕹️ Controls</h2>
        <p><span class="key">A</span> / <span class="key">←</span> - Move Left</p>
        <p><span class="key">D</span> / <span class="key">→</span> - Move Right</p>
        <p><span class="key">Space</span> - Jump</p>
        <hr style="border-color: #555; margin: 15px 0;">
        <p style="color: #999; font-size: 0.9em;">
            👤 <strong>Blue squares</strong> are players<br>
            📦 <strong>Brown squares</strong> are physics boxes
        </p>
    </div>

    <script type="module">
        // Check if WebSocket server is running
        async function checkServer() {
            const statusEl = document.getElementById('server-status');
            try {
                const ws = new WebSocket('ws://127.0.0.1:8080');
                ws.onopen = () => {
                    statusEl.textContent = '✅ Connected';
                    statusEl.style.color = '#4CAF50';
                    ws.close();
                };
                ws.onerror = () => {
                    statusEl.textContent = '❌ Not running (run platformer_server)';
                    statusEl.style.color = '#f44336';
                };
            } catch (e) {
                statusEl.textContent = '❌ Not running';
                statusEl.style.color = '#f44336';
            }
        }

        checkServer();

        // Load and initialize WASM module
        import init from './pkg/bevy_platformer_client_wasm.js';

        async function run() {
            try {
                await init();

                // Hide loading indicator
                document.getElementById('loading').style.display = 'none';

                console.log('✅ Bevy WASM game started!');
            } catch (error) {
                console.error('Failed to initialize WASM:', error);
                document.getElementById('loading').innerHTML = `
                    <p style="color: #f44336;">Failed to load game</p>
                    <p style="font-size: 0.8em; color: #999;">${error.message}</p>
                `;
            }
        }

        run();
    </script>
</body>
</html>
